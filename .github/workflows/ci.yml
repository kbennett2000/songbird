# Fast PR gate: backend (ruff lint + format-check, pyright strict, pytest) and frontend
# (eslint, tsc --noEmit, vitest, vite build). The live-Concord contract suite is excluded here
# (pyproject's default `-m "not concord"`) so the gate stays fast and needs no Concord — it runs
# on a schedule in nightly-concord.yml instead.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: backend gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check songbird
      - name: Ruff format check
        run: ruff format --check songbird
      - name: Pyright (strict)
        run: pyright
      - name: Pytest (fast suite; live Concord excluded)
        run: pytest

  frontend:
    name: frontend gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck
      - name: Vitest
        run: npm run test
      - name: Vite build
        run: npm run build
