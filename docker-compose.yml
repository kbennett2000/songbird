services:
  songbird:
    build: .
    image: songbird:local
    container_name: songbird
    restart: unless-stopped
    ports:
      - "${PORT:-8077}:8077"
    environment:
      # Concord is a hard runtime HTTP dependency. From INSIDE the container the host's
      # localhost is NOT the host machine — point at the host gateway (below) or a LAN IP.
      # songbird makes no co-location assumption (CLAUDE.md invariant 2).
      CONCORD_BASE_URL: "${CONCORD_BASE_URL:-http://host.docker.internal:8000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8077/healthz').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
